server:
  host: "127.0.0.1"
  port: 8080
  request_timeout_seconds: 180

fusion:
  enabled_by_default: true
  delayed_streaming: true
  stream_heartbeat_seconds: 10
  include_debug_in_response: false
  expose_debug_headers: true
  debug_dump_dir: null
  record_dir: null
  max_panel_concurrency: 8
  panel_timeout_seconds: 90
  judge_timeout_seconds: 90
  fallback_to_primary_on_failure: true

models:
  primary:
    url: "https://api.openai.com/v1"
    api_key: "${PRIMARY_API_KEY}"
    model_name: "gpt-4.1"
  aux:
    - name: "aux-mini-a"
      url: "https://api.openai.com/v1"
      api_key: "${AUX_A_API_KEY}"
      model_name: "gpt-4.1-mini"
      temperature: 0.0
    - name: "aux-mini-b"
      url: "https://api.openai.com/v1"
      api_key: "${AUX_B_API_KEY}"
      model_name: "gpt-4.1-mini"
      temperature: 0.0
  judge:
    url: "https://api.openai.com/v1"
    api_key: "${JUDGE_API_KEY}"
    model_name: "gpt-4.1-mini"
    temperature: 0.0
